<svg width="1200" height="630" viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4F46E5"/>
      <stop offset="100%" style="stop-color:#7C3AED"/>
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bgGradient)"/>
  
  <!-- Subtle pattern overlay -->
  <g opacity="0.05">
    <circle cx="100" cy="100" r="80" fill="white"/>
    <circle cx="1100" cy="530" r="120" fill="white"/>
    <circle cx="600" cy="50" r="60" fill="white"/>
    <circle cx="200" cy="500" r="40" fill="white"/>
    <circle cx="1000" cy="150" r="50" fill="white"/>
  </g>
  
  <!-- Main content -->
  <g transform="translate(600, 280)">
    <!-- Wrench icon -->
    <g transform="translate(-50, -160)">
      <text font-size="72" fill="white" opacity="0.9">🔧</text>
    </g>
    
    <!-- ToolMixr title -->
    <text x="0" y="0" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="96" font-weight="800" fill="white" text-anchor="middle">ToolMixr</text>
    
    <!-- Subtitle -->
    <text x="0" y="60" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="36" fill="white" opacity="0.9" text-anchor="middle">Free Online Tools</text>
    
    <!-- Bottom tagline -->
    <g transform="translate(0, 140)">
      <text x="0" y="0" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="24" fill="white" opacity="0.7" text-anchor="middle">23+ Tools · No Signup · 100% Free</text>
    </g>
  </g>
</svg>
